apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  name: voyage-ml-service

namespace: voyage-ml

resources:
- 01-namespace.yaml
- 02-configmap.yaml
- 03-deployment.yaml
- 04-service.yaml
- 05-hpa.yaml
- 06-serviceaccount.yaml
- 07-pdb.yaml
- 08-ingress.yaml
- 09-network-policy.yaml

commonLabels:
  app.kubernetes.io/name: voyage-ml-service
  app.kubernetes.io/version: "1.0"
  app.kubernetes.io/component: ml-service
  app.kubernetes.io/part-of: voyage-analytics

commonAnnotations:
  description: "Voyage Analytics ML Service for flight price prediction and gender classification"
  managed-by: "kustomize"

images:
- name: voyage-ml-service
  newTag: latest
