apiVersion: apps/v1
kind: Deployment
metadata:
  name: voyage-ml-service
  namespace: voyage-ml
  labels:
    app: voyage-ml-service
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: voyage-ml-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: voyage-ml-service
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: voyage-ml-service
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
      - name: ml-service
        image: voyage-ml-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 8000
          protocol: TCP
        env:
        - name: MLFLOW_TRACKING_URI
          valueFrom:
            configMapKeyRef:
              name: ml-service-config
              key: MLFLOW_TRACKING_URI
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: ml-service-config
              key: LOG_LEVEL
        - name: MODEL_URI
          valueFrom:
            configMapKeyRef:
              name: ml-service-config
              key: MODEL_URI
        - name: GENDER_MODEL_URI
          valueFrom:
            configMapKeyRef:
              name: ml-service-config
              key: GENDER_MODEL_URI
        resources:
          requests:
            cpu: 500m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 1Gi
        livenessProbe:
          httpGet:
            path: /v1/health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /v1/health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
        lifecycle:
          preStop:
            exec:
              command: ["/bin/sh", "-c", "sleep 15"]
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - voyage-ml-service
              topologyKey: kubernetes.io/hostname
