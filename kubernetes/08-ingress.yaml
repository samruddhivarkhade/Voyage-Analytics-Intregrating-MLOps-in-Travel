apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: voyage-ml-ingress
  namespace: voyage-ml
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/cors-allow-origin: "*"
spec:
  tls:
  - hosts:
    - api.voyage-analytics.local
    secretName: voyage-ml-tls
  rules:
  - host: api.voyage-analytics.local
    http:
      paths:
      - path: /v1
        pathType: Prefix
        backend:
          service:
            name: voyage-ml-service
            port:
              number: 80
      - path: /docs
        pathType: Prefix
        backend:
          service:
            name: voyage-ml-service
            port:
              number: 80
      - path: /health
        pathType: Exact
        backend:
          service:
            name: voyage-ml-service
            port:
              number: 80
