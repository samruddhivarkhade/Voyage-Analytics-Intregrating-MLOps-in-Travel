kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: voyage-ml-cluster
nodes:
  # Single control-plane node
  - role: control-plane
    image: kindest/node:v1.27.0
    extraPortMappings:
      - containerPort: 80
        hostPort: 80
        protocol: TCP
      - containerPort: 443
        hostPort: 443
        protocol: TCP
      - containerPort: 5000
        hostPort: 5000
        protocol: TCP

networking:
  apiServerAddress: "127.0.0.1"
  apiServerPort: 6443
