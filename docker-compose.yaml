version: '3.8'

services:
  # MLflow Tracking Server
  mlflow-server:
    image: python:3.11-slim
    working_dir: /app
    command: bash -c "pip install --quiet mlflow==2.22.0 && mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri sqlite:///mlflow.db"
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/app/mlruns
      - mlflow-db:/app
    environment:
      - PYTHONUNBUFFERED=1

  # ML Service (Flight Price + Gender Classification)
  ml-service:
    build:
      context: .
      dockerfile: ./ml-service/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow-server:5000
      - LOG_LEVEL=INFO

  # Load Balancer / Reverse Proxy (optional)
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro

volumes:
  mlflow-db:
    driver: local

networks:
  default:
    name: voyage-analytics
